<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лохотрон ігор і не тільки — список</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>
<div class="scanline" aria-hidden="true"></div>

<div class="wrap">

  <!-- Шапка сторінки. -->
  <header class="site-header">
    <h1 class="glitch-title"><span class="accent">РАНДОМАЙЗЕР</span> РАНДОМУ</h1>
    <div class="sub">Все просто, вводищ назву, потім тицяєш крутити і вуаля, скамиш</div>
  </header>

  <!-- HUD-панель введення нової гри. -->
  <section class="hud-panel">
    <div class="hud-panel-head">
      <span class="hud-label"><span class="dot">●</span> DATA_INPUT_MODULE</span>
      <span class="hud-flag">РЕЖИМ: СКАМ</span>
    </div>

    <!-- Останні 3 збережені списки — можна швидко відновити попередній набір ігор. -->
    <div class="history-block" id="historyBlock" style="display:none;">
      <div class="history-label">Останні списки</div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="add-row">
      <div class="input-shell">
        <span class="msi input-icon">terminal</span>
        <input type="text" id="gameInput" placeholder="ВВЕДІТЬ НАЗВУ ОБ'ЄКТА..." maxlength="60">
      </div>
      <div class="copies-shell" title="Кількість копій">
        <span class="copies-label">К-ТЬ</span>
        <input type="number" id="copiesInput" min="1" value="1">
      </div>
      <button class="btn-cta" id="addBtn"><span class="msi">add_box</span>ДОДАТИ</button>
    </div>
  </section>

  <!-- Список доданих ігор. -->
  <section class="list-section" id="buildPanel">
    <div class="list-head">
      <h2><span class="msi">list_alt</span>СПИСОК ІГОР</h2>
      <div class="list-actions">
        <button class="link-btn" id="resetAllBtn"><span class="msi">refresh</span>СКИНУТИ</button>
        <button class="link-btn danger" id="clearBtn"><span class="msi">layers_clear</span>ОЧИСТИТИ</button>
      </div>
    </div>

    <div id="ticketsWrap">
      <div class="empty-note" id="emptyNote">

        <p>Сканер порожній. Додайте ігри для ініціалізації розіграшу.</p>
      </div>
      <div class="tickets" id="tickets"></div>
    </div>
  </section>

  <!-- Перехід до розіграшу. -->
  <section class="cta-bar">
    <button class="hex-btn" id="lockBtn" disabled>
      <span class="msi spark">auto_awesome</span>
      ПОЧАТИ РОЗІГРАШ
      <span class="msi spark">auto_awesome</span>
    </button>
  </section>

</div>
  <!-- Спільні допоміжні функції, потім логіка цієї сторінки (не змінювалась). -->
  <script src="common.js"></script>
  <script src="build.js"></script>
</body>
</html>
